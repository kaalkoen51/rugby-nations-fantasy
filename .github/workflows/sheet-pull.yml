name: Sheet stats + lineups pull

# Pulls player stats and matchday lineups from the source Google Sheet
# (published as CSV) into Supabase. Runs often so live updates land quickly;
# every write is an idempotent upsert, so re-runs are safe. Scheduled
# workflows run on the default branch only.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

concurrency:
  group: sheet-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull stats + lineups from the sheet
        env:
          STATS_SHEET_CSV_URL: ${{ secrets.STATS_SHEET_CSV_URL }}
          LINEUPS_SHEET_CSV_URL: ${{ secrets.LINEUPS_SHEET_CSV_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FANTASY_LEAGUE_ID: ${{ secrets.FANTASY_LEAGUE_ID }}
        run: python sheet_pull.py
