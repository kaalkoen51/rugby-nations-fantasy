name: Scoring backtest

# Manual-only: sense-checks scoring balance across positions against a
# past World Cup (see backtest.py). Results appear in the job log.
on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (e.g. 2022)"
        default: "2022"
      stage:
        description: "Stage filter: all, group or knockout"
        default: "all"
      top:
        description: "How many tournament totals to list"
        default: "15"

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: >
          python backtest.py --season "${{ inputs.season }}"
          --stage "${{ inputs.stage }}" --top "${{ inputs.top }}"
