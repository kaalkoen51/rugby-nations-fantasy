name: Daily stats pull

# DISABLED — superseded by sheet-pull.yml. Stats now come from the source
# Google Sheet via sheet_pull.py, so this DS-API daily sweep no longer runs
# on a schedule (only manually). Re-enable by uncommenting the schedule.
on:
  # schedule:
  #   # 04:00 UTC = 06:00 SAST (South Africa, UTC+2)
  #   - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to re-pull (YYYY-MM-DD, UTC). Blank = yesterday."
        required: false
        default: ""

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pull
        env:
          DRAFT_SPORT_KEY: ${{ secrets.DRAFT_SPORT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FANTASY_LEAGUE_ID: ${{ secrets.FANTASY_LEAGUE_ID }}
          PULL_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$PULL_DATE" ]; then
            python daily_pull.py --date "$PULL_DATE"
          else
            python daily_pull.py
          fi
